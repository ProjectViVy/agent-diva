<svg
  width="256"
  height="256"
  viewBox="0 0 16 16"
  xmlns="http://www.w3.org/2000/svg"
  shape-rendering="crispEdges"
>
  <!-- Background -->
  <rect width="16" height="16" fill="#1e1f2e"/>

  <!-- Hair twin tails -->
  <rect x="1" y="4" width="2" height="7" fill="#00d7c8"/>
  <rect x="0" y="6" width="2" height="6" fill="#00aeb0"/>
  <rect x="13" y="4" width="2" height="7" fill="#00d7c8"/>
  <rect x="14" y="6" width="2" height="6" fill="#00aeb0"/>

  <!-- Hair back -->
  <rect x="4" y="2" width="8" height="2" fill="#00d7c8"/>
  <rect x="3" y="4" width="10" height="3" fill="#00d7c8"/>
  <rect x="4" y="6" width="8" height="2" fill="#00b8b5"/>

  <!-- Face -->
  <rect x="5" y="6" width="6" height="5" fill="#ffd6c9"/>
  <rect x="4" y="7" width="1" height="3" fill="#ffd6c9"/>
  <rect x="11" y="7" width="1" height="3" fill="#ffd6c9"/>

  <!-- Bangs -->
  <rect x="4" y="4" width="2" height="3" fill="#00f0df"/>
  <rect x="6" y="4" width="1" height="2" fill="#00f0df"/>
  <rect x="8" y="4" width="1" height="3" fill="#00f0df"/>
  <rect x="10" y="4" width="2" height="3" fill="#00f0df"/>

  <!-- Eyes -->
  <rect x="5" y="8" width="1" height="1" fill="#203040"/>
  <rect x="10" y="8" width="1" height="1" fill="#203040"/>
  <rect x="5" y="9" width="1" height="1" fill="#00bcd4"/>
  <rect x="10" y="9" width="1" height="1" fill="#00bcd4"/>

  <!-- Blush -->
  <rect x="4" y="10" width="1" height="1" fill="#ff8fa3"/>
  <rect x="11" y="10" width="1" height="1" fill="#ff8fa3"/>

  <!-- Mouth -->
  <rect x="7" y="10" width="2" height="1" fill="#c94f6d"/>

  <!-- Headphones -->
  <rect x="3" y="5" width="1" height="2" fill="#24283b"/>
  <rect x="12" y="5" width="1" height="2" fill="#24283b"/>
  <rect x="3" y="4" width="1" height="1" fill="#ff4fa3"/>
  <rect x="12" y="4" width="1" height="1" fill="#ff4fa3"/>

  <!-- Neck -->
  <rect x="7" y="11" width="2" height="1" fill="#f2b5a8"/>

  <!-- Outfit -->
  <rect x="5" y="12" width="6" height="3" fill="#2a2d3e"/>
  <rect x="6" y="12" width="4" height="1" fill="#d9faff"/>
  <rect x="7" y="13" width="2" height="2" fill="#00d7c8"/>

  <!-- Shoulders -->
  <rect x="4" y="13" width="1" height="2" fill="#2a2d3e"/>
  <rect x="11" y="13" width="1" height="2" fill="#2a2d3e"/>

  <!-- Tiny highlights -->
  <rect x="2" y="4" width="1" height="1" fill="#7ffdf2"/>
  <rect x="13" y="4" width="1" height="1" fill="#7ffdf2"/>
  <rect x="5" y="3" width="2" height="1" fill="#7ffdf2"/>
</svg>